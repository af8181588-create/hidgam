<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidgam</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 font-roboto">
    <!-- Navigation Bar -->
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
            <div class="relative flex items-center justify-between h-16">
                <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
                    <button class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-white" aria-controls="mobile-menu" aria-expanded="false">
                        <span class="sr-only">Open main menu</span>
                        <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                    </button>
                </div>
                <div class="flex-1 flex items-center justify-center sm:items-stretch sm:justify-start">
                    <div class="flex-shrink-0">
                        <h1 class="text-xl font-bold text-gray-800">Hidgam</h1>
                    </div>
                    <div class="hidden sm:block sm:ml-6">
                        <div class="flex space-x-4">
                            <a href="#" class="text-gray-500 hover:text-gray-800">Home</a>
                            <a href="#" class="text-gray-500 hover:text-gray-800">About</a>
                            <a href="#" class="text-gray-500 hover:text-gray-800">Services</a>
                            <a href="#" class="text-gray-500 hover:text-gray-800">Contact</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-cover bg-center h-screen" style="background-image: url('https://example.com/hero-image.jpg');">
        <div class="flex items-center justify-center h-full bg-gray-900 bg-opacity-50">
            <h2 class="text-5xl text-white font-extrabold">Welcome to Hidgam</h2>
        </div>
    </header>

    <!-- Bento Grid Visualization -->
    <section class="max-w-7xl mx-auto py-16">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-lg shadow">Section 1</div>
            <div class="bg-white p-4 rounded-lg shadow">Section 2</div>
            <div class="bg-white p-4 rounded-lg shadow">Section 3</div>
        </div>
    </section>

    <!-- Development Info Section -->
    <section class="bg-gray-200 py-10">
        <div class="max-w-7xl mx-auto text-center">
            <h3 class="text-2xl font-bold">Development Info</h3>
            <p class="mt-4">Developed by Ahmad Firdaus</p>
        </div>
    </section>

    <!-- Interactive Steps Section -->
    <section class="max-w-7xl mx-auto py-16">
        <h3 class="text-2xl text-center font-bold">How It Works</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 mt-10 gap-8">
            <div class="bg-white p-6 rounded-lg shadow text-center">
                <h4 class="font-semibold text-lg">Step 1</h4>
                <p>Description of Step 1.</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow text-center">
                <h4 class="font-semibold text-lg">Step 2</h4>
                <p>Description of Step 2.</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow text-center">
                <h4 class="font-semibold text-lg">Step 3</h4>
                <p>Description of Step 3.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white py-6">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-gray-500">&copy; 2026 Hidgam. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
