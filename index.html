<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css" rel="stylesheet">
  <title>Hidgam</title>
  <style>
    body { font-family: 'Arial', sans-serif; }
    .hero { background-image: url('path/to/chemistry_lab_background.jpg'); background-size: cover; }
  </style>
</head>
<body>
  <nav class="bg-blue-500 p-4">
    <h1 class="text-white text-lg">Hidgam</h1>
    <ul class="flex space-x-4">
      <li><a href="#features" class="text-white">Features</a></li>
      <li><a href="#info" class="text-white">Development Info</a></li>
      <li><a href="#steps" class="text-white">Interactive Steps</a></li>
      <li><a href="#footer" class="text-white">Footer</a></li>
    </ul>
  </nav>
  <section class="hero h-64 flex items-center justify-center">
    <h2 class="text-4xl text-white">Welcome to Hidgam!</h2>
  </section>
  <section id="features" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4">
    <div class="border p-4"><h3>Visualisasi Molekul</h3></div>
    <div class="border p-4"><h3>Prediksi pH</h3></div>
    <div class="border p-4"><h3>Case Study</h3></div>
    <div class="border p-4"><h3>Kuis Adaptif</h3></div>
  </section>
  <section id="info" class="p-4">
    <h2>Development Info</h2>
    <img src="path/to/ahmad_firdaus_image.jpg" alt="Ahmad Firdaus" />
    <p>Developer: Ahmad Firdaus</p>
  </section>
  <section id="steps" class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4">
    <div class="border p-4">Step 1</div>
    <div class="border p-4">Step 2</div>
    <div class="border p-4">Step 3</div>
  </section>
  <footer id="footer" class="bg-gray-200 p-4">
    <p>&copy; 2026 Hidgam</p>
  </footer>
</body>
</html>
